<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Parameters & Return Values</title>
    <style>
        /* Sovereign & Minimalist CSS */
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #ffffff;
        }
        
        h2 {
            font-weight: 500;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin: 25px 0;
            display: flex;
            gap: 10px;
        }
        
        input {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px;
            width: 80px;
            outline: none;
        }
        
        input:focus {
            border-color: #000;
        }
        
        button {
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        button:hover {
            background: #333;
        }
        
        #output {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 4px;
            min-height: 20px;
            font-family: monospace;
            font-size: 0.95rem;
        }
        
        .label {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <h2>Math Logic</h2>
    <p class="label">Step 1: Input values (Arguments)</p>

    <div class="input-group">
        <input id="n1" type="number" placeholder="0">
        <input id="n2" type="number" placeholder="0">
        <button onclick="handleLogic()">Run Function</button>
    </div>

    <p class="label">Step 2: Output (Return Value)</p>
    <div id="output">No data processed yet.</div>

    <script>
        // THE LOGIC: The 'a' and 'b' are local names for incoming data
        function multiply(a, b) {
            return a * b;
        }

        // THE INTERFACE: Connects the HTML to the logic
        function handleLogic() {
            const x = Number(document.getElementById("n1").value);
            const y = Number(document.getElementById("n2").value);
            const outputDiv = document.getElementById("output");

            if (!x || !y) {
                outputDiv.style.color = "red";
                outputDiv.innerText = "Error: Missing input.";
                return;
            }

            // We pass x and y as 'Arguments'
            const result = multiply(x, y);

            // We display the 'Return Value'
            outputDiv.style.color = "#333";
            outputDiv.innerHTML = `Function multiply(${x}, ${y}) returned: <strong>${result}</strong>`;
        }
    </script>

</body>

</html>
